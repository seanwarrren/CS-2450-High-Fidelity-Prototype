<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripPinner</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="header-logo">TripPinner <span>✈</span></a>
    <div class="header-actions">
      <a href="friends.html" class="header-friends-link">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span>Friends</span>
      </a>
      <button class="btn btn-gradient" id="create-trip-btn">+ Create Trip</button>
      <div class="header-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      </div>
    </div>
  </header>

  <main class="page-container">
    <div class="trips-tab-bar" id="trips-tab-bar">
      <button class="trips-tab active" data-tab="all">All</button>
      <button class="trips-tab" data-tab="previous">Previous</button>
      <button class="trips-tab" data-tab="current">Current</button>
      <button class="trips-tab" data-tab="upcoming">Upcoming</button>
    </div>

    <div class="trips-tab-content" id="trips-tab-content">
      <div class="trips-grid" id="all-trips-grid"></div>
      <div class="trips-grid" id="previous-trips-grid" style="display: none;"></div>
      <div class="trips-grid" id="current-trips-grid" style="display: none;"></div>
      <div class="trips-grid" id="upcoming-trips-grid" style="display: none;"></div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/trips.js"></script>
</body>
</html>
